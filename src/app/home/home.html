<h1>Webbutveckling - Ramschema</h1>

<section>
  <p>Sök:</p>
  <input type="text" placeholder="Sök..." id="input">
</section>

<section>
  <table>
    <thead>
      <tr>
        <th>Kurskod</th>
        <th>Kursnamn</th>
        <th>Progression</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let course of courses">
        <td>{{ course.code }}</td>
        <td>{{ course.coursename }}</td>
        <td>{{ course.progression }}</td>
      </tr>
    </tbody>
  </table>
</section>
